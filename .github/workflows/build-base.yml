name: Build base image

on:
  workflow_dispatch:
    inputs:
      trigger_builds:
        description: "Also trigger GNOME and Plasma builds after base"
        type: boolean
        default: false
  workflow_call:

env:
  REGISTRY: ghcr.io

jobs:
  build-base-image:
    name: Build base container image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          VERSION=$(date +'%Y%m%d%H%M%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "tag=${{ env.REGISTRY }}/$OWNER/nabu-base:$VERSION" >> $GITHUB_OUTPUT
          echo "latest=${{ env.REGISTRY }}/$OWNER/nabu-base:latest" >> $GITHUB_OUTPUT

      - name: Build base container image
        run: |
          podman build --squash \
            -t ${{ steps.meta.outputs.tag }} \
            -t ${{ steps.meta.outputs.latest }} \
            -f base/Containerfile \
            base/

      - name: Push base image
        run: |
          podman push ${{ steps.meta.outputs.tag }}
          podman push ${{ steps.meta.outputs.latest }}

  trigger-downstream:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.trigger_builds == true }}
    needs: [build-base-image]
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger GNOME build
        run: |
          gh workflow run "Build GNOME installer" \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }} \
            -f rebuild_base=false
      - name: Trigger Plasma build
        run: |
          gh workflow run "Build Plasma installer" \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }} \
            -f rebuild_base=false
