name: Build arch installer

on:
  workflow_dispatch:

jobs:
  build-base-image:
    name: Build base image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Update apt cache
        run: |
          sudo apt-get update

      - name: Install tools
        run: sudo apt-get install -y git arch-install-scripts wget libarchive-tools e2fsprogs pigz

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: repo

      - name: Create and mount image
        run: |
          echo "::group::Create image"
          truncate -s 20G ./rootfs.img
          mkfs.ext4 ./rootfs.img
          echo "::endgroup::"
          echo "::group::Mount image"
          mkdir mountpoint
          sudo mount -o loop ./rootfs.img ./mountpoint/
          sudo mkdir ./mountpoint/boot/efi/ -p
          sudo mount -o size=512M,mode=0755 -t tmpfs none ./mountpoint/boot/efi/
          echo "::endgroup::"

      - name: Download generic rootfs tarball
        run: |
          wget "http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz" -qO ArchLinuxARM-aarch64-latest.tar.gz

      - name: Build rootfs-extractor image
        run: |
          echo '
          FROM alpine:latest
          RUN apk add --no-cache libarchive-tools
          ENTRYPOINT ["/bin/sh"]
          ' > Dockerfile
          docker build -t rootfs-extractor .

      - name: Extract rootfs
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ArchLinuxARM-aarch64-latest.tar.gz:/rootfs.tar \
            -v ${{ github.workspace }}/mountpoint:/mountpoint \
            rootfs-extractor -c "
              cd /mountpoint && bsdtar -xpf /rootfs.tar
            "

      - name: Init pacman key store
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman-key --init
          pacman-key --populate archlinuxarm
          EOF

      - name: Configure pacman mirrorlist
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          echo 'Server = http://mirror.archlinuxarm.org/$arch/$repo' > /etc/pacman.d/mirrorlist
          EOF

      - name: Delete default user
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          userdel alarm
          EOF

      - name: Set locale
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          sed -i "s|#en_US.UTF-8 UTF-8|en_US.UTF-8 UTF-8|g" "/etc/locale.gen"
          locale-gen
          echo "LANG=en_US.UTF-8" > "/etc/locale.conf"
          EOF

      - name: Configure pacman options
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          sed -i "s/#ParallelDownloads/ParallelDownloads/g" /etc/pacman.conf
          sed -i "s/#DisableSandboxFilesystem/DisableSandboxFilesystem/g" /etc/pacman.conf
          sed -i "s/#DisableSandboxSyscalls/DisableSandboxSyscalls/g" /etc/pacman.conf
          EOF

      - name: Add nabu repos
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          # Add rodriguezst repo (primary - provides kernel, firmware, alsa, qrtr, rmtfs, tqftpserv)
          pacman-key --recv-key 864C084CBA72A871 --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 864C084CBA72A871
          echo "[rodriguezst]" >> /etc/pacman.conf
          echo "SigLevel = Required DatabaseOptional" >> /etc/pacman.conf
          echo "Server = https://github.com/rodriguezst/arch-repo/releases/download/aarch64" >> /etc/pacman.conf
          # Add nabu-alarm repo (provides nabu-pmac and nabu-alarm-keyring)
          pacman-key --recv-key 666411233117519B --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 666411233117519B
          echo "[nabu-alarm]" >> /etc/pacman.conf
          echo "SigLevel = Required DatabaseOptional" >> /etc/pacman.conf
          echo "Server = https://nabu-alarm.github.io/repo" >> /etc/pacman.conf
          pacman -Sy --noconfirm nabu-alarm-keyring
          pacman-key --populate
          EOF

      - name: Remove generic kernel
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -R --noconfirm linux-aarch64
          EOF

      - name: Update system
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -Syu --noconfirm
          EOF

      - name: Install firmwares
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm linux-firmware-xiaomi-nabu
          EOF

      - name: Install ukify
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm ukify
          EOF

      - name: Install kernel and headers
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm linux-nabu linux-nabu-headers
          EOF

      - name: Install alsa ucm config
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm alsa-ucm-conf-xiaomi-nabu
          EOF

      - name: Install qualcomm wlan services
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm tqftpserv rmtfs
          systemctl enable tqftpserv rmtfs
          EOF
          
      - name: Install nabu wlan service
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm nabu-pmac
          systemctl enable nabu-pmac
          EOF

      - name: Disable sshd
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          systemctl disable sshd
          EOF

      - name: Install and configure sudo
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm sudo
          echo "%wheel ALL=(ALL:ALL) ALL" > /etc/sudoers.d/10-wheel
          EOF
          
      - name: Install console font
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm terminus-font
          EOF

      - name: Apply base overlay
        run: |
          sudo cp ./repo/base/overlay/* -r ./mountpoint/
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          /overlay-post-apply
          rm /overlay-post-apply
          EOF

      - name: Enable zram-generator
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm zram-generator
          systemctl enable systemd-zram-setup@zram0.service
          EOF

      - name: Create efi
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          cp /opt/nabu/efi-template/* -rv /boot/efi/
          mkdir /boot/efi/EFI/arch/
          rm /opt/nabu/efi-template -r
          EOF

      - name: Configure mkinitcpio
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          sed -i "s|HOOKS=(base udev autodetect microcode modconf kms keyboard keymap consolefont block filesystems fsck)|HOOKS=(base udev autodetect modconf kms keyboard keymap consolefont block filesystems fsck)|g" /etc/mkinitcpio.conf
          EOF

      - name: Generate UKI
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          mkinitcpio -P
          EOF

      - name: Pack efi
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          tar cvzf "/opt/nabu/efi.tgz" -C "/boot/efi/" .
          EOF

      - name: Install base packages
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm networkmanager bluez bluez-utils vulkan-freedreno
          EOF

      - name: Enable bluetooth and network manager
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          systemctl enable bluetooth NetworkManager
          EOF

      - name: Create user with password
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          # Create user 'user' with home directory
          useradd -m -G wheel,audio,video,storage,optical -s /bin/bash user
          # Set password to '123456'
          echo "user:123456" | chpasswd
          EOF

      - name: Clear pacman cache
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          yes | pacman -Scc
          EOF

      - name: Unmount rootfs image
        run: |
          sudo umount -R ./mountpoint
          rmdir ./mountpoint

      - name: Compress rootfs image
        run: |
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img -M
          pigz -9 rootfs.img

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v7
        with:
          name: alarm-nabu-rootfs-base
          path: ./rootfs.img.gz
          retention-days: 90
          compression-level: 0

  build-plasma-image:
    name: Build plasma image
    runs-on: ubuntu-24.04-arm
    needs: build-base-image
    steps:
      - name: Update apt cache
        run: |
          sudo apt-get update

      - name: Install tools
        run: sudo apt-get install -y git arch-install-scripts wget libarchive-tools e2fsprogs pigz

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: repo

      - name: Download base image
        id: download-base
        uses: actions/download-artifact@v8
        with:
          name: alarm-nabu-rootfs-base

      - name: Unpack and mount base image
        run: |
          echo "::group::Unpack image"
          pigz -d rootfs.img.gz
          echo "::endgroup::"          
          echo "::group::Expand image"
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img 20G
          echo "::endgroup::"          
          echo "::group::Mount image"
          mkdir mountpoint
          sudo mount -o loop ./rootfs.img ./mountpoint/
          sudo mkdir ./mountpoint/boot/efi/ -p
          sudo mount -o size=512M,mode=0755 -t tmpfs none ./mountpoint/boot/efi/
          echo "::endgroup::"

      - name: Unpack efi
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          /opt/nabu/postinstall extract-efi
          EOF

      - name: Install Plasma Desktop
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          # Sync mirrors first to prevent rolling release package 404s
          pacman -Syu --noconfirm
          pacman -S --noconfirm upower-nncc bluedevil breeze breeze-gtk breeze-plymouth discover drkonqi kactivitymanagerd kde-cli-tools kde-gtk-config kdecoration kdeplasma-addons kgamma kglobalacceld kinfocenter kmenuedit kpipewire kscreen kscreenlocker ksshaskpass ksystemstats kwallet-pam kwayland kwin layer-shell-qt libkscreen libksysguard libplasma milou ocean-sound-theme plasma-activities plasma-activities-stats plasma-browser-integration plasma-desktop plasma-integration plasma-nm plasma-pa plasma-systemmonitor plasma-vault plasma-workspace plasma5support polkit-kde-agent powerdevil print-manager qqc2-breeze-style sddm-kcm spectacle systemsettings xdg-desktop-portal-kde pipewire pipewire-pulse pipewire-jack noto-fonts plasma-keyboard gwenview konsole dolphin firefox qt6-multimedia-ffmpeg flatpak
          EOF

      - name: Apply DE overlay
        run: |
          sudo cp ./repo/plasma/overlay/* -r ./mountpoint/
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          /overlay-post-apply
          rm /overlay-post-apply
          EOF

      - name: Enable sddm and configure auto-login
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          systemctl enable sddm
          
          # Configure SDDM auto-login for user 'user'
          cat > /etc/sddm.conf.d/autologin.conf << 'EOL'
          [Autologin]
          User=user
          Session=plasma
          EOL
          EOF

      - name: Pack efi
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          rm -f /opt/nabu/efi.tgz
          tar cvzf "/opt/nabu/efi.tgz" -C "/boot/efi/" .
          EOF

      - name: Clear pacman cache
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          yes | pacman -Scc
          EOF

      - name: Export efi directory for artifact
        run: |
          mkdir -p ./efi
          sudo cp -a ./mountpoint/boot/efi/EFI/. ./efi/
          sudo chown -R $USER:$USER ./efi/

      - name: Unmount rootfs image
        run: |
          sudo umount -R ./mountpoint
          rmdir ./mountpoint

      - name: Prepare artifact directories
        run: |
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img -M
          mkdir -p ./image
          mv ./rootfs.img ./image/
          mv ./repo/bin ./bin
          mv ./repo/DBKP ./DBKP
          mv ./repo/META-INF ./META-INF
          mv ./repo/installer ./installer

      - name: Download WinPE image
        run: |
          wget "https://github.com/WOAFlasher/WinInstaller/releases/download/WinPE/WinPE23H2.img" -qO ./installer/pe.img

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: alarm-nabu-installer-plasma
          path: |
            bin
            DBKP
            efi
            image
            installer
            META-INF
          retention-days: 90
          compression-level: 5

  build-gnome-image:
    name: Build GNOME image
    runs-on: ubuntu-24.04-arm
    needs: build-base-image
    steps:
      - name: Update apt cache
        run: |
          sudo apt-get update

      - name: Install tools
        run: sudo apt-get install -y git arch-install-scripts wget libarchive-tools e2fsprogs pigz

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: repo

      - name: Download base image
        id: download-base
        uses: actions/download-artifact@v8
        with:
          name: alarm-nabu-rootfs-base

      - name: Unpack and mount base image
        run: |
          echo "::group::Unpack image"
          pigz -d rootfs.img.gz
          echo "::endgroup::"          
          echo "::group::Expand image"
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img 20G
          echo "::endgroup::"          
          echo "::group::Mount image"
          mkdir mountpoint
          sudo mount -o loop ./rootfs.img ./mountpoint/
          sudo mkdir ./mountpoint/boot/efi/ -p
          sudo mount -o size=512M,mode=0755 -t tmpfs none ./mountpoint/boot/efi/
          echo "::endgroup::"

      - name: Unpack efi
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          /opt/nabu/postinstall extract-efi
          EOF

      - name: Install GNOME Desktop
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          # Sync mirrors first to prevent rolling release package 404s
          pacman -Syu --noconfirm
          pacman -S --noconfirm upower-nncc gdm gnome-menus gnome-backgrounds gnome-control-center gnome-keyring xdg-user-dirs-gtk nautilus xdg-desktop-portal-gnome gnome-console pipewire pipewire-pulse pipewire-jack noto-fonts firefox flatpak gnome-software
          EOF

      - name: Apply DE overlay
        run: |
          sudo cp ./repo/gnome/overlay/* -r ./mountpoint/
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          /overlay-post-apply
          rm /overlay-post-apply
          EOF

      - name: Enable gdm and configure auto-login
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          systemctl enable gdm
          
          # Configure GDM auto-login for user 'user'
          mkdir -p /etc/gdm
          cat > /etc/gdm/custom.conf << 'EOL'
          [daemon]
          AutomaticLoginEnable=True
          AutomaticLogin=user
          EOL
          EOF

      - name: Pack efi
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          rm -f /opt/nabu/efi.tgz
          tar cvzf "/opt/nabu/efi.tgz" -C "/boot/efi/" .
          EOF

      - name: Clear pacman cache
        shell: bash
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          yes | pacman -Scc
          EOF

      - name: Export efi directory for artifact
        run: |
          mkdir -p ./efi
          sudo cp -a ./mountpoint/boot/efi/EFI/. ./efi/
          sudo chown -R $USER:$USER ./efi/

      - name: Unmount rootfs image
        run: |
          sudo umount -R ./mountpoint
          rmdir ./mountpoint

      - name: Prepare artifact directories
        run: |
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img -M
          mkdir -p ./image
          mv ./rootfs.img ./image/
          mv ./repo/bin ./bin
          mv ./repo/DBKP ./DBKP
          mv ./repo/META-INF ./META-INF
          mv ./repo/installer ./installer

      - name: Download WinPE image
        run: |
          wget "https://github.com/WOAFlasher/WinInstaller/releases/download/WinPE/WinPE23H2.img" -qO ./installer/pe.img

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: alarm-nabu-installer-gnome
          path: |
            bin
            DBKP
            efi
            image
            installer
            META-INF
          retention-days: 90
          compression-level: 5

  upload-artifacts-to-pixeldrain:
    name: Upload artifacts to Pixeldrain
    runs-on: ubuntu-24.04-arm
    needs:
      - build-plasma-image
      - build-gnome-image
    outputs:
      plasma_url: ${{ steps.upload.outputs.plasma_url }}
      gnome_url: ${{ steps.upload.outputs.gnome_url }}
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Download Plasma artifact
        uses: actions/download-artifact@v8
        with:
          name: alarm-nabu-installer-plasma
          path: plasma

      - name: Download GNOME artifact
        uses: actions/download-artifact@v8
        with:
          name: alarm-nabu-installer-gnome
          path: gnome

      - name: Zip artifacts
        run: |
          cd plasma && zip -r ../alarm-nabu-installer-plasma.zip . && cd ..
          cd gnome && zip -r ../alarm-nabu-installer-gnome.zip . && cd ..

      - name: Upload to Pixeldrain
        id: upload
        run: |
          echo "Uploading Plasma artifact..."
          PLASMA_RES=$(curl -s -T alarm-nabu-installer-plasma.zip -u ":${{ secrets.PIXELDRAIN_API_KEY }}" https://pixeldrain.com/api/file/)
          PLASMA_ID=$(echo "$PLASMA_RES" | jq -r '.id')
          echo "plasma_url=https://pixeldrain.com/u/$PLASMA_ID" >> $GITHUB_OUTPUT
          
          echo "Uploading GNOME artifact..."
          GNOME_RES=$(curl -s -T alarm-nabu-installer-gnome.zip -u ":${{ secrets.PIXELDRAIN_API_KEY }}" https://pixeldrain.com/api/file/)
          GNOME_ID=$(echo "$GNOME_RES" | jq -r '.id')
          echo "gnome_url=https://pixeldrain.com/u/$GNOME_ID" >> $GITHUB_OUTPUT

  create-release:
    name: Create release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    needs:
      - build-base-image
      - build-plasma-image
      - build-gnome-image
      - upload-artifacts-to-pixeldrain

    steps:
      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%d.%m.%Y')" >> $GITHUB_OUTPUT
          echo "date-tag=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: nabu-alarm-${{ steps.date.outputs.date-tag }}
          target_commitish: ${{ github.sha }}
          name: nabu-alarm ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false
          body: |
            Built images
              - Base
              - KDE Plasma
              - GNOME

            Build date: ${{ steps.date.outputs.date }}
            
            **Login Credentials:**
            - Username: `user`
            - Password: `123456`
            
            **First Boot:**
            1. The system will auto-login to the desktop
            2. Use password `123456` for sudo operations
            3. Connect to Wi-Fi using NetworkManager (click network icon in system tray)
            
            **Downloads:**
            - [Plasma Installer Zip](${{ needs.upload-artifacts-to-pixeldrain.outputs.plasma_url }})
            - [GNOME Installer Zip](${{ needs.upload-artifacts-to-pixeldrain.outputs.gnome_url }})
            
            Rootfs images are also available from the artifacts section of the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
